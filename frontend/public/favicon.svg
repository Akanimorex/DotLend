      <stop offset="0%"   stop-color="#F0287A"/>
      <stop offset="100%" stop-color="#8B2A8B"/>
    </linearGradient>
  </defs>
  <!-- Dot grid: 4 cols × 5 rows, matching the logo layout -->
  <!-- row 0 -->
  <circle cx="32" cy="16" r="8" fill="url(#g)"/>
  <circle cx="52" cy="16" r="8" fill="url(#g)"/>
  <!-- row 1 -->
  <circle cx="12" cy="32" r="8" fill="url(#g)"/>
  <circle cx="32" cy="32" r="8" fill="url(#g)"/>
  <circle cx="52" cy="32" r="8" fill="url(#g)"/>
  <!-- row 2 -->
  <circle cx="12" cy="50" r="8" fill="url(#g)"/>
  <circle cx="32" cy="50" r="8" fill="url(#g)"/>
  <circle cx="72" cy="50" r="8" fill="url(#g)"/>
  <!-- row 3 -->
  <circle cx="12" cy="68" r="8" fill="url(#g)"/>
  <circle cx="32" cy="68" r="8" fill="url(#g)"/>
  <circle cx="52" cy="68" r="8" fill="url(#g)"/>
  <circle cx="72" cy="68" r="8" fill="url(#g)"/>
  <!-- row 4 -->
  <circle cx="12" cy="86" r="8" fill="url(#g)"/>
  <circle cx="32" cy="86" r="8" fill="url(#g)"/>
  <circle cx="52" cy="86" r="8" fill="url(#g)"/>
  <!-- Arrow: top-right corner -->
  <path d="M58 10 L88 10 L88 40" stroke="url(#g)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M46 62 L86 12" stroke="url(#g)" stroke-width="12" stroke-linecap="round" fill="none"/>
</svg>
